// Top-level build file where you add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        kotlinVersion = "1.8.10" 
        buildToolsVersion = "33.0.0"
        minSdkVersion = 21
        compileSdkVersion = 33
        targetSdkVersion = 33
        // 라이브러리 버전 고정
        androidx_appcompat_version = "1.6.1"
        androidx_core_version = "1.10.1"
        androidx_activity_version = "1.7.2"
        androidx_lifecycle_version = "2.6.2"

        // We use NDK 23 which has both M1 support and is the side-by-side NDK version from AGP.
        ndkVersion = "23.1.7779620"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle:7.4.2")
        classpath("com.facebook.react:react-native-gradle-plugin:0.72.0")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
    
    // Kotlin 버전 충돌 해결
    configurations.all {
        resolutionStrategy {
            force "org.jetbrains.kotlin:kotlin-stdlib:${kotlinVersion}"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:${kotlinVersion}"
            force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:${kotlinVersion}"
        }
    }
    
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            jvmTarget = "11"
        }
    }
}